<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Education Reflection Tool｜教授用</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg-soft: #f3f5ff;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-sub: #6b7280;
      --radius-lg: 24px;
      --radius-md: 16px;
      --border: #e5e7eb;
      --shadow-soft: 0 20px 60px rgba(15, 23, 42, 0.08);
      --purple: #6366f1;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #e0f2ff, #f9fafb 60%);
      color: var(--text-main);
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 50;

      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 18px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);

      text-align: center;
    }

    .header-title {
      font-size: 20px;
      font-weight: 800;
    }

    .header-sub {
      margin-top: 4px;
      color: var(--text-sub);
      font-size: 12px;
    }

    .header-right {
      min-width: 120px;

      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }

    main {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .panel {
      margin-bottom: 28px;
      padding: 24px 28px;

      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    h2 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 600;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    .panel-sub {
      margin-bottom: 6px;
      color: var(--text-sub);
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 14px;

      font-size: 14px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      margin-top: 6px;
      padding: 10px 14px;

      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: var(--radius-md);

      font-size: 14px;
      resize: vertical;
    }

    textarea:focus-visible {
      background: #ffffff;
      border-color: var(--purple);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2);
      outline: none;
    }

    button {
      margin-top: 14px;
      padding: 12px 20px;

      border: none;
      border-radius: 999px;

      background: var(--purple);
      color: #ffffff;

      font-size: 15px;
      cursor: pointer;

      box-shadow: 0 10px 26px rgba(99, 102, 241, 0.3);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 10px 18px;

      border: 1px solid var(--border);
      border-radius: 999px;

      background: #ffffff;
      color: #111827;
      text-decoration: none;

      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      transition:
        transform 0.15s,
        box-shadow 0.15s;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
    }

    .back-btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
    }

    .goal-list {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .goal-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;

      line-height: 1.5;
    }

    .goal-item input {
      margin-top: 4px;
    }

    .goal-title {
      font-weight: 700;
    }

    .goal-desc {
      margin-top: 4px;
      color: var(--text-sub);
      font-size: 13px;
    }

    .round-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(30px, 1fr));
      gap: 6px;
    }

    .round-btn {
      all: unset;

      position: relative;

      display: flex;
      align-items: center;
      gap: 6px;

      font-size: 14px;
      cursor: pointer;
    }

    .round-btn::before {
      content: "";

      width: 14px;
      height: 14px;

      display: inline-block;

      border: 1.5px solid #666666;
      border-radius: 3px;
    }

    .round-btn.is-on::before {
      content: "✓";

      display: flex;
      align-items: center;
      justify-content: center;

      background: var(--blue);
      border-color: var(--blue);
      color: #ffffff;

      font-size: 11px;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <header class="sticky-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="back-btn">← 役割選択に戻る</a>
      </div>

      <div class="header-center">
        <div class="header-title">教師用設定画面</div>
        <div class="header-sub">授業のねらいと振り返り質問を設定できます</div>
      </div>

      <div class="header-right">
        <button id="resetBtn" class="reset-btn" type="button">リセット</button>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <h3>① 授業のねらい（選択式）</h3>

      <div id="goalChecks" class="goal-list">
        <label class="goal-item">
          <input type="checkbox" value="understand">
          <div>
            <div class="goal-title">内容理解（要点・仕組みをつかむ）</div>
            <div class="goal-desc">
              授業で扱った内容について、重要なポイントや全体の流れ・構造、なぜその仕組みになっているのかを理解し、自分の中で整理できるようになること。
            </div>
          </div>
        </label>

        <label class="goal-item">
          <input type="checkbox" value="explain">
          <div>
            <div class="goal-title">説明（自分の言葉で説明・理由づけ）</div>
            <div class="goal-desc">
              学んだ内容を、専門用語に頼らず他者にも伝わる言葉で、「なぜそう言えるのか」という理由や根拠を添えて説明できるようになること。
            </div>
          </div>
        </label>

        <label class="goal-item">
          <input type="checkbox" value="think">
          <div>
            <div class="goal-title">思考（比較・検討・深掘り）</div>
            <div class="goal-desc">
              物事をそのまま受け取るのではなく、他の考え方と比べる／本当にそうなのか問い直す／背景や原因を深く考えるといった思考プロセスを身につけること。
            </div>
          </div>
        </label>

        <label class="goal-item">
          <input type="checkbox" value="attitude">
          <div>
            <div class="goal-title">態度（主体性・振り返り・粘り強さ）</div>
            <div class="goal-desc">
              自分から考えようとする姿勢、うまくいかなかった点を振り返る姿勢、簡単に諦めずに取り組み続ける姿勢など、学習に向かう態度を育てること。
            </div>
          </div>
        </label>

        <label class="goal-item">
          <input type="checkbox" value="apply">
          <div>
            <div class="goal-title">応用（他の場面に活かす）</div>
            <div class="goal-desc">
              授業で学んだことを、日常生活・他の授業・将来の活動など別の場面でも活用できるようになること。
            </div>
          </div>
        </label>

        <label class="goal-item">
          <input type="checkbox" value="collab">
          <div>
            <div class="goal-title">協働（対話・役割分担・合意形成）</div>
            <div class="goal-desc">
              グループ活動を通して、意見を出し合う／役割を分担する／お互いの考えを尊重しながら結論を出すといった協働的な学びを経験すること。
            </div>
          </div>
        </label>
      </div>

      <button id="autoGenBtnGoals">質問を自動生成</button>
    </section>

    <section class="panel">
      <h3>② 学生に投げる質問（振り返り項目）</h3>

      <label>質問1</label>
      <textarea id="qItem1"></textarea>

      <label>質問2</label>
      <textarea id="qItem2"></textarea>

      <label>質問3</label>
      <textarea id="qItem3"></textarea>

      <button id="confirmBtn">質問を確定する</button>
      <button id="saveBtn">保存（下書き）</button>
    </section>

    <section class="panel">
      <h3>③ 深掘りする回の設定</h3>
      <div class="panel-sub">
        通常回は「まとめ生成」、指定した回だけ「深掘り対話」にできます
      </div>

      <label>深掘りを実施する回（複数選択OK）</label>

      <div class="panel-sub" style="margin-top:8px;">
        選択中：<span id="deepDiveRoundsSelected">なし</span>
      </div>

      <div id="deepDiveRounds" class="round-grid" style="margin-top:10px;"></div>

      <button id="saveRoundsBtn" class="save-btn">
        回数を確定する
      </button>
    </section>
  </main>

  <script>
    const resetBtn = document.getElementById("resetBtn");
    const saveBtn = document.getElementById("saveBtn");
    const confirmBtn = document.getElementById("confirmBtn");

    const q1El = document.getElementById("qItem1");
    const q2El = document.getElementById("qItem2");
    const q3El = document.getElementById("qItem3");

    const goalCheckEls = document.querySelectorAll(
      '#goalChecks input[type="checkbox"]'
    );

    const autoGenBtnGoals = document.getElementById("autoGenBtnGoals");

    const goalQuestionBank = {
      understand: [
        "今日の内容の中で、最も重要だと思うポイントは何ですか？",
        "今日扱った仕組みや流れを、順番に整理するとどうなりますか？",
        "今日のテーマを一言でまとめると何になりますか？"
      ],
      explain: [
        "今日学んだことを、専門用語を使わずに説明するとどうなりますか？",
        "なぜそれが大切だと言えるのか、理由もあわせて説明してください。",
        "初めて学ぶ人に教えるとしたら、どのように説明しますか？"
      ],
      think: [
        "今日の内容と、これまで学んだことを比べるとどんな違いがありますか？",
        "もし別の方法をとるとしたら、どんな選択肢が考えられますか？",
        "もう一歩深く考えると、どんな疑問が浮かびますか？"
      ],
      attitude: [
        "今日の学習にどのくらい主体的に取り組めましたか？理由も書いてください。",
        "うまくいかなかった場面があれば、どう乗り越えましたか？",
        "今日の取り組み方で、次回に活かしたいことは何ですか？"
      ],
      apply: [
        "今日学んだことは、どんな場面で活かせそうですか？",
        "自分の日常や将来と結びつけると、どんな使い道がありますか？",
        "この考え方を別の分野に応用するとしたら、どんな例が考えられますか？"
      ],
      collab: [
        "今日のグループ活動で、自分はどんな役割を果たしましたか？",
        "意見が違ったとき、どのように合意をつくりましたか？",
        "チームでうまくいった理由は何だと思いますか？"
      ]
    };

    const deepDiveRoundsWrap = document.getElementById("deepDiveRounds");
    const deepDiveRoundsSelected = document.getElementById(
      "deepDiveRoundsSelected"
    );
    const saveRoundsBtn = document.getElementById("saveRoundsBtn");
    const selectedRounds = new Set();

    function getSelectedGoals() {
      return [...goalCheckEls]
        .filter((c) => c.checked)
        .map((c) => c.value);
    }

    function saveDraft() {
      const goals = [...goalCheckEls]
        .filter((c) => c.checked)
        .map((c) => c.value);

      localStorage.setItem("goals", JSON.stringify(goals));
      localStorage.setItem("qItem1", q1El.value);
      localStorage.setItem("qItem2", q2El.value);
      localStorage.setItem("qItem3", q3El.value);

      localStorage.setItem(
        "deepDiveRounds",
        JSON.stringify([...selectedRounds].sort((a, b) => a - b))
      );
    }

    function generateQuestionsFromGoals() {
      const selected = getSelectedGoals();

      if (selected.length === 0) {
        alert("ねらいを1つ以上チェックしてください（補足は任意）。");
        return;
      }

      const main = selected[0] || "understand";
      const sub = selected[1];
      const mainQs = goalQuestionBank[main];

      q1El.value = mainQs[0];

      if (sub && goalQuestionBank[sub]) {
        q2El.value = goalQuestionBank[sub][1];
        q3El.value = mainQs[2];
      } else {
        q2El.value = mainQs[1];
        q3El.value = mainQs[2];
      }
    }

    function renderSelectedRounds() {
      if (!deepDiveRoundsSelected) return;

      const arr = [...selectedRounds].sort((a, b) => a - b);
      deepDiveRoundsSelected.textContent = arr.length
        ? arr.join(", ") + "回"
        : "なし";
    }

    function load() {
      const savedGoals = JSON.parse(localStorage.getItem("goals") || "[]");
      goalCheckEls.forEach((c) => {
        c.checked = savedGoals.includes(c.value);
      });

      q1El.value = localStorage.getItem("qItem1") || "";
      q2El.value = localStorage.getItem("qItem2") || "";
      q3El.value = localStorage.getItem("qItem3") || "";

      const savedRounds = JSON.parse(
        localStorage.getItem("deepDiveRounds") || "[]"
      );

      selectedRounds.clear();
      savedRounds.forEach((n) => selectedRounds.add(Number(n)));

      document.querySelectorAll("#deepDiveRounds .round-btn").forEach((btn) => {
        const n = Number(btn.dataset.round);
        btn.classList.toggle("is-on", selectedRounds.has(n));
      });

      renderSelectedRounds();
    }

    function restoreDeepDiveRounds() {
      const saved = JSON.parse(localStorage.getItem("deepDiveRounds") || "[]");
      saved.forEach((n) => selectedRounds.add(Number(n)));

      document.querySelectorAll("#deepDiveRounds .round-btn").forEach((btn) => {
        const n = Number(btn.dataset.round);

        if (selectedRounds.has(n)) {
          btn.classList.add("is-on");
        }
      });

      renderSelectedRounds();
    }

    function buildRoundButtons() {
      if (!deepDiveRoundsWrap) return;

      const max = 13;

      for (let i = 1; i <= max; i++) {
        const btn = document.createElement("button");

        btn.type = "button";
        btn.className = "round-btn";
        btn.textContent = i + "回";
        btn.dataset.round = String(i);

        btn.addEventListener("click", () => {
          const n = Number(btn.dataset.round);

          if (selectedRounds.has(n)) {
            selectedRounds.delete(n);
            btn.classList.remove("is-on");
          } else {
            selectedRounds.add(n);
            btn.classList.add("is-on");
          }

          renderSelectedRounds();
          saveDraft();
        });

        deepDiveRoundsWrap.appendChild(btn);
      }

      renderSelectedRounds();
    }

    autoGenBtnGoals.addEventListener("click", generateQuestionsFromGoals);

    goalCheckEls.forEach((el) => {
      el.addEventListener("change", saveDraft);
    });

    [q1El, q2El, q3El].forEach((el) => {
      el.addEventListener("input", saveDraft);
    });

    saveBtn.onclick = () => {
      saveDraft();
      alert("保存しました（下書き）。");
    };

    confirmBtn.onclick = () => {
      localStorage.setItem("qItem1", q1El.value);
      localStorage.setItem("qItem2", q2El.value);
      localStorage.setItem("qItem3", q3El.value);

      localStorage.setItem("confirmedQ1", q1El.value);
      localStorage.setItem("confirmedQ2", q2El.value);
      localStorage.setItem("confirmedQ3", q3El.value);

      alert("質問を確定しました（学生画面に反映）。");
    };

    if (saveRoundsBtn) {
      saveRoundsBtn.addEventListener("click", () => {
        const arr = [...selectedRounds].sort((a, b) => a - b);

        localStorage.setItem("deepDiveRounds", JSON.stringify(arr));
        alert("深掘りする回を保存しました。");
      });
    }

    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        const ok = confirm("保存内容をすべてリセットします。よろしいですか？");
        if (!ok) return;

        [
          "goals",
          "goalNote",
          "qItem1",
          "qItem2",
          "qItem3",
          "confirmedQ1",
          "confirmedQ2",
          "confirmedQ3",
          "deepDiveRounds"
        ].forEach((k) => localStorage.removeItem(k));

        for (let i = 1; i <= 13; i++) {
          localStorage.removeItem(`insight_${i}`);
          localStorage.removeItem(`understanding_${i}`);
          localStorage.removeItem(`growth_${i}`);
          localStorage.removeItem(`reason_${i}`);
        }

        goalCheckEls.forEach((c) => {
          c.checked = false;
        });

        q1El.value = "";
        q2El.value = "";
        q3El.value = "";

        selectedRounds.clear();

        document.querySelectorAll("#deepDiveRounds .round-btn").forEach((btn) => {
          btn.classList.remove("is-on");
        });

        renderSelectedRounds();

        alert("リセットしました。");
      });
    }

    buildRoundButtons();
    restoreDeepDiveRounds();
    load();
  </script>
</body>
</html>
