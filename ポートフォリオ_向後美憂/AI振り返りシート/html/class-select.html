<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>授業選択｜Education Reflection Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --text-main: #111827;
      --text-sub: #6b7280;
      --blue: #2563eb;
      --purple: #7c3aed;
      --card-radius: 26px;
      --shadow-soft: 0 24px 70px rgba(15, 23, 42, 0.16);
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background: radial-gradient(
        circle at top,
        #eef2ff 0,
        #f9fbff 40%,
        #fefbff 100%
      );
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 50;

      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 18px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .header-center {
      flex: 1;
      text-align: center;
    }

    .header-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
    }

    .header-sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .header-right {
      width: 120px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 10px 18px;

      border: 1px solid var(--border);
      border-radius: 999px;

      background: #ffffff;
      color: #111827;

      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      transition:
        transform 0.15s,
        box-shadow 0.15s;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
    }

    .back-btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
    }

    .page {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px 40px;

      display: flex;
      flex-direction: column;
    }

    .hero {
      margin-bottom: 32px;
      text-align: center;
    }

    .hero-title {
      margin-bottom: 8px;
      color: var(--blue);
      font-size: 26px;
      font-weight: 700;
    }

    .hero-desc {
      color: var(--text-sub);
      font-size: 14px;
    }

    .outer-card {
      width: 100%;
      max-width: 780px;
      margin: 24px auto 0;
      padding: 32px 26px 26px;

      background: #ffffff;
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
    }

    .course-card {
      display: flex;
      align-items: center;
      gap: 18px;

      padding: 18px 20px;

      border: 1px solid #e0e7ff;
      border-radius: 22px;

      background: linear-gradient(135deg, #faf5ff, #f5f7ff);
      box-shadow: 0 16px 40px rgba(129, 140, 248, 0.3);

      cursor: pointer;

      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        border-color 0.22s ease;
    }

    .course-card:hover {
      transform: scale(1.02);
      border-color: #c4b5fd;
      box-shadow: 0 22px 60px rgba(79, 70, 229, 0.35);
    }

    .course-icon {
      width: 64px;
      height: 64px;
      flex-shrink: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 20px;

      background: linear-gradient(135deg, #6366f1, #ec4899);
      color: #ffffff;

      font-size: 32px;
      box-shadow: 0 18px 40px rgba(79, 70, 229, 0.4);
    }

    .course-main {
      flex: 1;

      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .course-title {
      color: var(--text-main);
      font-size: 18px;
      font-weight: 600;
    }

    .course-desc {
      color: var(--text-sub);
      font-size: 13px;
    }

    .course-arrow {
      padding-left: 8px;
      color: var(--blue);
      font-size: 20px;
    }

    .course-footer {
      margin-top: 22px;
      color: #9ca3af;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>
  <header class="sticky-header">
    <div class="header-inner">
      <div class="header-left">
        <button class="back-btn" id="backBtn">← 戻る</button>
      </div>

      <div class="header-center">
        <div class="header-title">授業選択</div>
        <div class="header-sub">振り返りを行う授業を選んでください</div>
      </div>

      <div class="header-right"></div>
    </div>
  </header>

  <div class="page">
    <section class="outer-card">
      <div class="course-card" onclick="location.href='student.html'">
        <div class="course-icon">📖</div>

        <div class="course-main">
          <div class="course-title">情報デザイン基礎</div>
          <div class="course-desc">振り返りを入力してAIコーチと対話します</div>
        </div>

        <div class="course-arrow">→</div>
      </div>

      <div class="course-footer">
        他の授業は準備中です
      </div>
    </section>
  </div>

  <script>
    document.getElementById("backBtn").addEventListener("click", () => {
      history.back();
    });
  </script>
</body>
</html>
