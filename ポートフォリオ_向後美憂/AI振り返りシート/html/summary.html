<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Education Reflection Tool｜今週のまとめ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-sub: #6b7280;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow-soft: 0 20px 60px rgba(15, 23, 42, 0.08);
      --blue: #2563eb;
      --purple: #7c3aed;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--text-main);
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 50;

      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
    }

    .header-inner {
      position: relative;

      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 18px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);

      text-align: center;
    }

    .header-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
    }

    .header-sub {
      margin-top: 4px;
      color: var(--text-sub);
      font-size: 12px;
    }

    .header-right {
      min-width: 120px;

      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 10px 18px;

      border: 1px solid var(--border);
      border-radius: 999px;

      background: #ffffff;
      color: #111827;

      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      transition:
        transform 0.15s,
        box-shadow 0.15s;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
    }

    .back-btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
    }

    main {
      flex: 1;
      padding: 16px 16px 40px;
    }

    .layout {
      max-width: 1200px;
      margin: 0;

      display: grid;
      grid-template-columns: 180px 1fr;
      align-items: stretch;
      gap: 8px;
    }

    .sidebar {
      position: sticky;
      top: 96px;
      align-self: stretch;

      width: 180px;
      height: auto;
      padding: 8px;
    }

    .side-card {
      height: 100%;
      padding: 16px;

      display: flex;
      flex-direction: column;

      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.07);
    }

    .side-title {
      margin: 0 0 12px;

      color: #374151;
      font-size: 14px;
      font-weight: 800;
    }

    .session-list {
      flex: 1;
      max-height: calc(100vh - 150px);
      padding-right: 6px;

      display: flex;
      flex-direction: column;
      gap: 10px;

      overflow: auto;
    }

    .session-btn {
      width: 100%;
      height: 39px;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid var(--border);
      border-radius: 14px;

      background: #f3f4f6;
      color: #374151;

      font-weight: 800;
      cursor: pointer;
    }

    .session-btn:hover {
      background: rgba(243, 244, 246, 0.95);
    }

    .session-btn.active {
      border: none;
      background: linear-gradient(135deg, #60a5fa, #8b5cf6);
      color: #ffffff;
      box-shadow: 0 12px 26px rgba(124, 58, 237, 0.22);
    }

    .panel {
      height: 100%;
      margin-top: 16px;
      margin-bottom: 24px;
      padding: 22px 24px 26px;

      display: flex;
      flex-direction: column;

      background: var(--card-bg);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    .panel-head {
      margin-bottom: 10px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 6px 10px;

      border: 1px solid rgba(229, 231, 235, 1);
      border-radius: 999px;

      background: rgba(243, 244, 246, 0.9);
      color: #374151;

      font-size: 12px;
      font-weight: 800;
    }

    .ai-summary {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ai-item {
      padding: 14px;

      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(229, 231, 235, 1);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .ai-body {
      color: #111827;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 12px;
      }

      .session-list {
        flex-direction: row;
        overflow: auto;
        padding-bottom: 4px;
      }

      .session-btn {
        min-width: 92px;
        height: 44px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="sticky-header">
      <div class="header-inner">
        <div class="header-left">
          <button class="back-btn" id="backBtn">← 戻る</button>
        </div>

        <div class="header-center">
          <div class="header-title">まとめ</div>
          <div class="header-sub">
            AI学習コーチと一緒に、対話内容をもとに授業を振り返りましょう
          </div>
        </div>

        <div class="header-right"></div>
      </div>
    </header>

    <main>
      <div class="layout">
        <aside class="sidebar">
          <div class="side-card">
            <div class="side-title">回数</div>
            <div class="session-list" id="sessionList"></div>
          </div>
        </aside>

        <section class="panel">
          <div class="panel-head">
            <h2 style="margin:0;">今回のまとめ（AI生成）</h2>
            <span class="badge" id="sessionBadge">3回目</span>
          </div>

          <div class="ai-summary">
            <div class="ai-item">
              <div class="ai-body" id="insight"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const TOTAL_SESSIONS = 13;

    const backBtn = document.getElementById("backBtn");
    const sessionListEl = document.getElementById("sessionList");
    const sessionBadgeEl = document.getElementById("sessionBadge");
    const insightEl = document.getElementById("insight");
    const changeNoteEl = document.getElementById("changeNote");

    const clamp = (n, min, max) => Math.min(max, Math.max(min, n));
    const clean = (v) => (!v || v === "undefined" || v === "null") ? "" : v;

    const keyAI = (name, n) => `${name}_${n}`;
    const keyChangeNote = (n) => `changeNote_${n}`;

    let currentSession = parseInt(
      localStorage.getItem("summaryCurrentSession") || "1",
      10
    );

    currentSession = clamp(
      Number.isNaN(currentSession) ? 1 : currentSession,
      1,
      TOTAL_SESSIONS
    );

    function getSessionFromURL() {
      const params = new URLSearchParams(location.search);
      const v = parseInt(params.get("session"), 10);

      if (!Number.isNaN(v) && v >= 1 && v <= TOTAL_SESSIONS) {
        return v;
      }

      return null;
    }

    function renderSessionButtons() {
      sessionListEl.innerHTML = "";

      for (let i = 1; i <= TOTAL_SESSIONS; i++) {
        const btn = document.createElement("button");
        btn.className = "session-btn" + (i === currentSession ? " active" : "");
        btn.textContent = `${i}回目`;

        btn.addEventListener("click", () => {
          currentSession = i;
          localStorage.setItem("summaryCurrentSession", String(currentSession));
          updateUI();
        });

        sessionListEl.appendChild(btn);
      }
    }

    function loadAISummary(n) {
      insightEl.textContent = clean(localStorage.getItem(keyAI("insight", n)));

      if (changeNoteEl) {
        changeNoteEl.value = clean(localStorage.getItem(keyChangeNote(n)));
      }
    }

    function saveAISummary(n) {
      localStorage.setItem(
        keyAI("insight", n),
        (insightEl.textContent || "").trim()
      );

      if (changeNoteEl) {
        localStorage.setItem(
          keyChangeNote(n),
          (changeNoteEl.value || "").trim()
        );
      }
    }

    function updateUI() {
      sessionBadgeEl.textContent = `${currentSession}回目`;
      renderSessionButtons();
      loadAISummary(currentSession);
    }

    window.addEventListener("DOMContentLoaded", () => {
      const urlSession = getSessionFromURL();

      if (urlSession) {
        currentSession = urlSession;
        localStorage.setItem("summaryCurrentSession", String(currentSession));
      }

      updateUI();
    });

    backBtn.addEventListener("click", () => {
      history.back();
    });
  </script>
</body>
</html>
