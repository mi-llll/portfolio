<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education Reflection Tool｜ホーム</title>

  <style>
    :root {
      --text-main: #111827;
      --text-sub: #6b7280;
      --card-radius: 28px;
      --shadow-soft: 0 24px 70px rgba(15, 23, 42, 0.16);
      --purple: #7c3aed;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background: radial-gradient(
        circle at top,
        #eef2ff 0,
        #f9fbff 40%,
        #f5f7ff 100%
      );
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    /* ページ全体を中央配置 */
    .page {
      width: 100%;
      max-width: 960px;
      min-height: 100vh;
      padding: 40px 16px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 見出し */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .hero-desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    /* メインカード */
    .card-wrapper {
      width: 100%;
      max-width: 720px;
      margin: 0 auto 40px;
    }

    .main-card {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 32px;
      box-shadow: var(--shadow-soft);
      padding: 40px 32px 36px;

      display: flex;
      flex-direction: column;
      align-items: center;

      text-align: center;
      color: #ffffff;

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .main-card:hover {
      transform: scale(1.03);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.28);
    }

    .card-inner {
      width: 100%;
      max-width: 440px;
    }

    .icon-circle {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 999px;
      background: #ffffffee;

      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      font-size: 34px;
    }

    .main-card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .main-card-sub {
      font-size: 14px;
      line-height: 1.7;
      opacity: 0.95;
      margin-bottom: 26px;
    }

    .btn-primary {
      padding: 11px 32px;

      border: none;
      border-radius: 999px;

      font-size: 15px;
      font-weight: 600;

      cursor: pointer;

      background: #f9f5ff;
      color: var(--purple);

      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.35);
      transition: 0.15s ease;
    }

    .btn-primary:hover {
      background: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.4);
    }

    /* 教授用設定ボタン */
    .teacher-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      padding: 8px 14px;

      border: 1px solid #e5e7eb;
      border-radius: 999px;

      background: #ffffff;
      color: #374151;

      font-size: 13px;
      cursor: pointer;

      box-shadow: 0 8px 20px rgba(148, 163, 184, 0.25);
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .teacher-link-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.28);
    }

    .footer-row {
      width: 100%;
      max-width: 720px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      margin-top: 24px;
    }

    .footer-note {
      font-size: 12px;
      color: var(--text-sub);
    }

    @media (max-width: 640px) {
      .footer-row {
        flex-direction: column;
        gap: 16px;
      }

      .footer-note {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <section class="hero">
      <h1 class="hero-title">振り返り支援ツール</h1>
      <p class="hero-desc">
        AI学習コーチが、あなたの振り返りを深めます。
      </p>
    </section>

    <div class="card-wrapper">
      <article class="main-card">
        <div class="card-inner">
          <div class="icon-circle">📝</div>

          <h2 class="main-card-title">振り返りを始める</h2>

          <p class="main-card-sub">
            授業の振り返りを入力して、
            AIコーチと対話しながら学びを深めていきましょう。
          </p>

          <button
            class="btn-primary"
            onclick="location.href='class-select.html'"
          >
            スタート →
          </button>
        </div>
      </article>
    </div>

    <div class="footer-row">
      <button
        class="teacher-link-btn"
        onclick="location.href='teacher.html'"
      >
        🎓 教授用設定
      </button>

      <div class="footer-note">
        AIは答えではなく、
        あなた自身の気づきを深めるための質問を投げかけます。
      </div>
    </div>
  </div>
</body>
</html>
